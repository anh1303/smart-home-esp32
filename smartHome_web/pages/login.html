<section id="login-view" class="login-shell">
  <div class="login-card">
    <div class="brand-mark">⌂</div>
    <h1>SmartHome Dashboard</h1>
    <p class="muted login-copy">Đăng nhập để điều khiển và giám sát hệ thống ESP32.</p>
    <form id="login-form" class="login-form">
      <label>ID người dùng
        <input id="login-username" autocomplete="username" placeholder="admin">
      </label>
      <label>Mật khẩu
        <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••">
      </label>
      <button class="btn btn-primary" type="submit">Đăng nhập</button>
      <div id="login-error" class="error-line"></div>
    </form>
  </div>
</section>
