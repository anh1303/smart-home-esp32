<section class="card">
  <div class="card-head">
    <div class="card-title"><span class="room-icon">◌</span>Cửa sổ số liệu</div>
    <span id="sensor-time" class="chip">---</span>
  </div>
  <div class="sensor-grid">
    <div class="stat-card">
      <div class="label">Nhiệt độ</div>
      <div id="temp-value" class="value">--°C</div>
      <div class="delta">DHT11</div>
    </div>
    <div class="stat-card">
      <div class="label">Độ ẩm</div>
      <div id="humidity-value" class="value">--%</div>
      <div class="delta">DHT11</div>
    </div>
    <div class="stat-card">
      <div class="label">Chuyển động</div>
      <div id="motion-value" class="value">---</div>
      <div id="motion-detail" class="delta">2 cảm biến hành lang</div>
    </div>
    <div class="stat-card">
      <div class="label">Khoảng cách gara</div>
      <div id="distance-value" class="value">---cm</div>
      <div id="distance-detail" class="delta">Ngưỡng phát hiện 7cm</div>
    </div>
  </div>
</section>
